name: CI

on:
    push:
        branches:
            - main
            - master
    pull_request:

jobs:
    rust:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
              with:
                  components: rustfmt
            - name: cargo fmt --check
              run: cargo fmt --check
            - name: cargo check
              run: cargo check
